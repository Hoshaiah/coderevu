services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: coderevu-app
    env_file:
      - .env.local
    environment:
      # Monaco's bundles push Turbopack past the default 4GB heap and trigger
      # "approaching memory threshold" auto-restarts mid-request. Give node
      # more headroom in dev.
      NODE_OPTIONS: "--max-old-space-size=8192"
    ports:
      # Host 3001 -> container 3000 (3000 is taken on the host by another
      # project). Set NEXT_PUBLIC_APP_URL in .env.local to http://localhost:3001
      # if you reach the app via the host port.
      - "3001:3000"
    volumes:
      # Live source for hot reload. This also exposes ./service-account.json
      # if present, which lib/firebase/admin.ts picks up from cwd.
      - .:/app
      # Keep container-installed node_modules and .next separate from the host
      # so alpine-compiled binaries don't collide with the mac host.
      - coderevu_node_modules:/app/node_modules
      - coderevu_next:/app/.next
    restart: unless-stopped

volumes:
  coderevu_node_modules:
  coderevu_next:
